name: Draft release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.5.3)"
        required: true

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: pipx install poetry
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          cache: poetry
      - run: poetry install
      - run: poetry run pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure main branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Releases must be made from main" && exit 1
          fi

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-zA-Z][a-zA-Z0-9]*\.[0-9]+)?$'; then
            echo "Version must be a semantic version (e.g. 1.5.3)" && exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Bump version in pyproject.toml
        run: sed -i 's/^version = .*/version = "${{ github.event.inputs.version }}"/' pyproject.toml

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "bump version to ${{ github.event.inputs.version }}"
          git tag "${{ github.event.inputs.version }}"
          git push origin main
          git push origin "${{ github.event.inputs.version }}"

      - name: Create draft release
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --draft \
            --title "${{ github.event.inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
